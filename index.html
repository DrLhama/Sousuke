<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛩️ Golden Era — Fichas</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inconsolata:wght@300;400;700&family=Noto+Serif+JP:wght@300;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/the-last-shuriken" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Texturina:ital,opsz,wght@0,12..72,100..900;1,12..72,100..900&display=swap" rel="stylesheet">
<style>

  
/* ─────────────────────────────────────────
   PARA ADICIONAR UM NOVO PERSONAGEM:
   1. Crie sheets/seunome.html
   2. Adicione um objeto no array ROSTER (no script abaixo)
   3. Pronto.
───────────────────────────────────────── */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: #030200;
  color: #ccc8b0;
  font-family: 'Libre Baskerville', serif;
  min-height: 100vh;
  overflow-x: hidden;
}


/* ── BACKGROUND ── */
.bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 120% 60% at 50% 100%, rgba(8,6,0,.98) 0%, transparent 60%),
    radial-gradient(ellipse 80% 50% at 20% 50%, rgba(40,20,0,.12) 0%, transparent 55%),
    radial-gradient(ellipse 80% 50% at 80% 50%, rgba(20,40,8,.1) 0%, transparent 55%),
    radial-gradient(ellipse 100% 30% at 50% 0%, rgba(15,10,0,.8) 0%, transparent 55%);
}
.bg-grain {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .018;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── HEADER ── */
header {
  position: relative; z-index: 2;
  text-align: center;
  padding: 72px 24px 48px;
}
.header-label {
  font-family: 'Inconsolata', monospace;
  font-size: .52rem; letter-spacing: .65em; text-transform: uppercase;
  color: rgba(180,155,70,.3);
  margin-bottom: 18px;
}
.header-title {
  font-family: 'shuriken', serif;
  font-size: clamp(1.8rem, 5vw, 3.2rem);
  letter-spacing: .2em;
  color: rgba(220,190,100,.18);
  line-height: 1;
}
.header-rule {
  width: 240px; height: 1px; margin: 28px auto 0;
  background: linear-gradient(90deg, transparent, rgba(140,110,40,.2), transparent);
}

/* ── ROSTER GRID ── */
main {
  position: relative; z-index: 2;
  max-width: 1100px; margin: 0 auto;
  padding: 0 28px 100px;
}

.roster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1px;
  background: rgba(60,45,10,.12);
  border: 1px solid rgba(60,45,10,.15);
}

/* ── CARD ── */
.char-card {
  position: relative; overflow: hidden;
  padding: 40px 36px 36px;
  background: #060500;
  cursor: pointer;
  text-decoration: none; color: inherit;
  display: block;
  transition: background .35s;
  border: 1px solid transparent;
  min-height: 280px;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.char-card::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--card-glow, transparent);
  opacity: 0; transition: opacity .4s;
  pointer-events: none;
}
.char-card:hover { background: #080700; }
.char-card:hover::before { opacity: 1; }
.char-card:hover .card-enter { opacity: 1; transform: none; }
.char-card:hover .card-accent { opacity: .9; }

/* accent bar top */
.card-accent {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--card-color, rgba(180,160,80,.3));
  opacity: .35; transition: opacity .35s;
}

/* big kanji watermark */
.card-kanji {
  position: absolute; bottom: -16px; right: -8px;
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(90px, 14vw, 140px);
  color: var(--card-color, rgba(180,160,80,.08));
  opacity: .07; user-select: none; pointer-events: none;
  line-height: 1; transition: opacity .4s;
}
.char-card:hover .card-kanji { opacity: .13; }

.card-num {
  font-family: 'Inconsolata', monospace;
  font-size: .48rem; letter-spacing: .45em; text-transform: uppercase;
  color: rgba(140,120,50,.35);
  margin-bottom: 14px;
  position: relative; z-index: 1;
}
.card-name {
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  letter-spacing: .12em; line-height: 1;
  color: var(--card-color, rgba(220,200,120,.5));
  position: relative; z-index: 1;
  margin-bottom: 6px;
}
.card-name.rye    { font-family: 'Rye', serif; }
.card-name.bebas  { font-family: 'Bebas Neue', sans-serif; }
.card-name.shuriken { font-family: 'The Last Shuriken', sans-serif; }
.card-name.texturina { font-family: 'Texturina', serif; }

.card-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: .65rem;
  color: rgba(140,120,50,.28);
  margin-bottom: 18px;
  position: relative; z-index: 1;
}
.card-tags {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-bottom: 22px;
  position: relative; z-index: 1;
}
.card-tag {
  font-family: 'Inconsolata', monospace;
  font-size: .46rem; letter-spacing: .12em; text-transform: uppercase;
  padding: 2px 8px;
  border: 1px solid rgba(100,80,30,.2);
  color: rgba(130,110,50,.4);
}
.card-epithet {
  font-style: italic; font-size: .8rem; line-height: 1.9;
  color: rgba(140,120,60,.3);
  position: relative; z-index: 1;
  margin-bottom: 24px;
}
.card-enter {
  font-family: 'Inconsolata', monospace;
  font-size: .48rem; letter-spacing: .4em; text-transform: uppercase;
  color: var(--card-color, rgba(180,160,80,.5));
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s, transform .3s;
  position: relative; z-index: 1;
}

/* ── SOUSUKE — estilos específicos ── */
.char-card.sousuke-card {
  background: #050202;
}
.char-card.sousuke-card:hover {
  background: #080303;
}

/* Drips animados no topo do card */
.card-drips {
  position: absolute; top: 0; left: 0; right: 0; height: 60px;
  pointer-events: none; overflow: hidden;
}
.card-drip {
  position: absolute; top: 0; width: 1px; border-radius: 0 0 1px 1px;
  background: linear-gradient(180deg, rgba(110,26,26,.9) 0%, rgba(80,16,16,.5) 60%, transparent 100%);
  animation: cdrop var(--d, 5s) ease-in infinite var(--dl, 0s);
}
@keyframes cdrop {
  0%   { transform: scaleY(0); opacity: .8; }
  55%  { transform: scaleY(1); opacity: .7; }
  85%  { transform: scaleY(1); opacity: .4; }
  100% { transform: scaleY(0) translateY(60px); opacity: 0; }
}

/* Veias SVG animadas no fundo do card */
.card-veins {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.vein-path {
  stroke: rgba(139,10,10,.55);
  stroke-width: 1px;
  fill: none;
  stroke-dasharray: 180;
  stroke-dashoffset: 180;
  animation: vein-draw var(--d, 5s) ease-in-out infinite var(--dl, 0s);
}
@keyframes vein-draw {
  0%   { stroke-dashoffset: 180; opacity: 0; }
  15%  { opacity: 1; }
  60%  { stroke-dashoffset: 0; opacity: .7; }
  85%  { stroke-dashoffset: 0; opacity: .3; }
  100% { stroke-dashoffset: -180; opacity: 0; }
}

/* Kanji do Sousuke pulsa */
.sousuke-card .card-kanji {
  animation: kanji-pulse 10s ease-in-out infinite;
  opacity: .09;
}
@keyframes kanji-pulse {
  0%, 100% { opacity: .06; transform: scale(1); }
  50%       { opacity: .14; transform: scale(1.02); }
}

/* Nome do Sousuke — glow de sangue pulsante */
.sousuke-card .card-name {
  will-change: text-shadow;
  animation: name-bleed 10s ease-in-out infinite;
  letter-spacing: .06em;
  font-size: clamp(2.6rem, 7vw, 3.4rem);
}
@keyframes name-bleed {
  0%, 100% { text-shadow: 0 0 0px rgba(255,0,0,.0), 0 2px 0 rgba(80,0,0,.8); }
  50%       { text-shadow: 0 0 60px rgba(185,22,22,.6), 0 2px 0 rgba(0,0,0,.95); }
}

/* Accent bar do Sousuke pulsa junto */
.sousuke-card .card-accent {
  background: linear-gradient(90deg, rgba(139,10,10,.6), rgba(192,48,48,.8), rgba(139,10,10,.6));
  animation: accent-pulse 10s ease-in-out infinite;
}
@keyframes accent-pulse {
  0%, 100% { opacity: .3; }
  50%       { opacity: .85; }
}

/* Tags do Sousuke — borda sanguínea */
.sousuke-card .card-tag {
  border-color: rgba(139,10,10,.3);
  color: rgba(180,80,80,.45);
}

/* Epitáfio do Sousuke */
.sousuke-card .card-epithet {
  color: rgba(160,80,80,.35);
}

/* Num do Sousuke */
.sousuke-card .card-num {
  color: rgba(160,80,60,.4);
}

/* JP do Sousuke */
.sousuke-card .card-jp {
  color: rgba(160,60,60,.3);
}

/* ── YAGAMI — estilos específicos ── */
.char-card.yagami-card {
  background: #020508;
}
.char-card.yagami-card:hover {
  background: #030810;
}

/* Linhas de varredura ciano — como um terminal ativo */
.yagami-card .card-veins {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.yagami-scan-line {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(80,200,240,.35) 40%, rgba(138,224,255,.5) 50%, rgba(80,200,240,.35) 60%, transparent 100%);
  animation: yscan var(--d, 8s) ease-in-out infinite var(--dl, 0s);
  opacity: 0;
}
@keyframes yscan {
  0%          { top: 0%;   opacity: 0; }
  5%          { opacity: 1; }
  80%         { top: 100%; opacity: .6; }
  85%, 100%   { top: 100%; opacity: 0; }
}

/* Kanji do Yagami — pulsa suavemente em ciano */
.yagami-card .card-kanji {
  animation: ykanji 12s ease-in-out infinite;
  opacity: .06;
  color: rgba(80,200,240,.5);
}
@keyframes ykanji {
  0%, 100% { opacity: .04; transform: scale(1); }
  50%       { opacity: .10; transform: scale(1.015); }
}

/* Nome — glow abissal ciano */
.yagami-card .card-name {
  animation: yname 12s ease-in-out infinite;
}
@keyframes yname {
  0%, 100% { text-shadow: none; }
  50%       { text-shadow: 0 0 50px rgba(80,200,240,.35), 0 0 12px rgba(80,200,240,.2); }
}

/* Accent bar ciano pulsante */
.yagami-card .card-accent {
  background: linear-gradient(90deg, transparent, rgba(80,200,240,.6), rgba(138,224,255,.8), rgba(80,200,240,.6), transparent);
  animation: yaccent 12s ease-in-out infinite;
}
@keyframes yaccent {
  0%, 100% { opacity: .2; }
  50%       { opacity: .75; }
}

/* Tags ciano */
.yagami-card .card-tag {
  border-color: rgba(80,200,240,.18);
  color: rgba(80,200,240,.35);
}
.yagami-card .card-epithet { color: rgba(100,190,230,.3); }
.yagami-card .card-num     { color: rgba(80,200,240,.3); }
.yagami-card .card-jp      { color: rgba(80,160,200,.25); }

/* Corner brackets visíveis no hover */
.yagami-card::after {
  content: '';
  position: absolute; bottom: 14px; right: 14px;
  width: 16px; height: 16px;
  border-bottom: 1px solid rgba(80,200,240,.2);
  border-right:  1px solid rgba(80,200,240,.2);
  transition: border-color .3s;
}
.yagami-card:hover::after {
  border-color: rgba(80,200,240,.55);
}

/* ── KAITO — estilos específicos ── */
.char-card.kaito-card { background: #08060e; }
.char-card.kaito-card:hover { background: #0e0818; }

/* Partículas de vazio — pontos roxos flutuando */
.kaito-void-dot {
  position: absolute;
  border-radius: 50%;
  background: rgba(147,51,234,.6);
  box-shadow: 0 0 4px rgba(147,51,234,.4);
  animation: kvoid var(--d, 8s) ease-in-out infinite var(--dl, 0s);
  opacity: 0;
}
@keyframes kvoid {
  0%          { bottom: -4px; opacity: 0; transform: scale(.8); }
  10%         { opacity: 1; }
  80%         { bottom: 105%; opacity: .4; }
  100%        { bottom: 105%; opacity: 0; }
}

.kaito-card .card-kanji {
  animation: kkanji 12s ease-in-out infinite;
  opacity:.05; color:rgba(147,51,234,.8);
}
@keyframes kkanji { 0%,100%{opacity:.04;transform:scale(1)} 50%{opacity:.11;transform:scale(1.015)} }

.kaito-card .card-name {
  animation: kname 12s ease-in-out infinite;
}
@keyframes kname {
  0%,100% { text-shadow: none; }
  50%     { text-shadow: 0 0 50px rgba(147,51,234,.4), 0 0 12px rgba(147,51,234,.2); }
}

.kaito-card .card-accent {
  background: linear-gradient(90deg, transparent, rgba(107,33,168,.5), rgba(147,51,234,.75), rgba(192,132,252,.9), rgba(147,51,234,.75), rgba(107,33,168,.5), transparent);
  animation: kaccent 12s ease-in-out infinite;
}
@keyframes kaccent { 0%,100%{opacity:.15} 50%{opacity:.8} }

.kaito-card .card-tag     { border-color: rgba(147,51,234,.2); color: rgba(192,132,252,.45); }
.kaito-card .card-epithet { color: rgba(192,132,252,.28); }
.kaito-card .card-num     { color: rgba(147,51,234,.35); }
.kaito-card .card-jp      { color: rgba(120,60,180,.28); }

/* Corner — dois ângulos opostos */
.kaito-card::before {
  content: ''; position: absolute; top: 14px; left: 14px;
  width: 14px; height: 14px;
  border-top: 1px solid rgba(147,51,234,.25);
  border-left: 1px solid rgba(147,51,234,.25);
  transition: border-color .3s;
}
.kaito-card::after {
  content: ''; position: absolute; bottom: 14px; right: 14px;
  width: 14px; height: 14px;
  border-bottom: 1px solid rgba(147,51,234,.25);
  border-right:  1px solid rgba(147,51,234,.25);
  transition: border-color .3s;
}
.kaito-card:hover::before { border-color: rgba(147,51,234,.6); }
.kaito-card:hover::after  { border-color: rgba(147,51,234,.6); }


/* ── SAIZO — estilos específicos ── */
.char-card.saizo-card { background: #030a04; }
.char-card.saizo-card:hover { background: #050e06; }

/* Gosma escorregando do topo */
.saizo-card .card-drips {
  position: absolute; top: 0; left: 0; right: 0; height: 70px;
  pointer-events: none; overflow: hidden;
}
.saizo-slime-drip {
  position: absolute; top: 0;
  border-radius: 0 0 50% 50%;
  background: linear-gradient(180deg, rgba(22,163,74,.55) 0%, rgba(22,163,74,.25) 55%, transparent 100%);
  animation: sdrip var(--d, 6s) ease-in infinite var(--dl, 0s);
}
@keyframes sdrip {
  0%   { transform: scaleY(0); opacity: .7; }
  50%  { transform: scaleY(1); opacity: .55; }
  80%  { transform: scaleY(1); opacity: .3; }
  100% { transform: scaleY(0) translateY(70px); opacity: 0; }
}

/* Blobs flutuando de baixo pra cima */
.saizo-blob {
  position: absolute;
  border-radius: 60% 40% 55% 45% / 50% 55% 45% 50%;
  background: rgba(22,163,74,.45);
  box-shadow: 0 0 5px rgba(22,163,74,.3);
  animation: sblob var(--d, 9s) ease-in-out infinite var(--dl, 0s);
  opacity: 0;
}
@keyframes sblob {
  0%          { bottom: -6px; opacity: 0; transform: scale(.7) rotate(0deg); border-radius: 60% 40% 55% 45% / 50% 55% 45% 50%; }
  12%         { opacity: 1; }
  80%         { bottom: 108%; opacity: .35; transform: scale(1.1) rotate(120deg); border-radius: 40% 60% 45% 55% / 55% 45% 50% 50%; }
  100%        { bottom: 108%; opacity: 0; }
}

/* Kanji amorfo — pulsa e deforma */
.saizo-card .card-kanji {
  animation: skanji 11s ease-in-out infinite;
  opacity: .05;
  color: rgba(22,163,74,.9);
  filter: blur(.5px);
}
@keyframes skanji {
  0%,100% { opacity: .04; transform: scale(1) skew(0deg); filter: blur(.5px); }
  50%     { opacity: .12; transform: scale(1.03) skew(-1deg, .5deg); filter: blur(0px); }
}

/* Nome — glow tóxico */
.saizo-card .card-name {
  animation: sname 11s ease-in-out infinite;
}
@keyframes sname {
  0%,100% { text-shadow: none; }
  50%     { text-shadow: 0 0 50px rgba(22,163,74,.4), 0 0 12px rgba(74,222,128,.2); }
}

/* Accent bar verde escorregando */
.saizo-card .card-accent {
  background: linear-gradient(90deg, transparent, rgba(22,101,52,.5), rgba(22,163,74,.75), rgba(74,222,128,.9), rgba(22,163,74,.75), rgba(22,101,52,.5), transparent);
  animation: saccent 11s ease-in-out infinite;
}
@keyframes saccent { 0%,100%{opacity:.18} 50%{opacity:.8} }

.saizo-card .card-tag     { border-color: rgba(22,163,74,.2); color: rgba(74,222,128,.42); }
.saizo-card .card-epithet { color: rgba(74,222,128,.27); }
.saizo-card .card-num     { color: rgba(22,163,74,.35); }
.saizo-card .card-jp      { color: rgba(22,120,50,.28); }

/* Cantos orgânicos — irregulares */
.saizo-card::before {
  content: ''; position: absolute; top: 12px; left: 12px;
  width: 14px; height: 14px;
  border-top: 1px solid rgba(22,163,74,.22);
  border-left: 1px solid rgba(22,163,74,.22);
  border-radius: 0 0 0 2px;
  transition: border-color .3s;
}
.saizo-card::after {
  content: ''; position: absolute; bottom: 12px; right: 12px;
  width: 14px; height: 14px;
  border-bottom: 1px solid rgba(22,163,74,.22);
  border-right: 1px solid rgba(22,163,74,.22);
  border-radius: 0 0 2px 0;
  transition: border-color .3s;
}
.saizo-card:hover::before { border-color: rgba(22,163,74,.6); }
.saizo-card:hover::after  { border-color: rgba(22,163,74,.6); }

/* ── HANZO — estilos específicos ── */
.char-card.hanzo-card { background: #06050000; background: #070501; }
.char-card.hanzo-card:hover { background: #0d0a01; }

/* Moedas de ouro subindo */
.hanzo-coin {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(255,230,100,.9), rgba(200,150,10,.7) 60%, rgba(140,90,0,.4));
  box-shadow: 0 0 5px rgba(220,170,20,.35), inset 0 1px 1px rgba(255,240,150,.5);
  animation: hcoin var(--d, 9s) ease-in-out infinite var(--dl, 0s);
  opacity: 0;
}
@keyframes hcoin {
  0%          { bottom: -8px; opacity: 0; transform: scale(.7) rotate(0deg) translateX(0px); }
  8%          { opacity: 1; }
  50%         { transform: scale(1) rotate(180deg) translateX(var(--sway, 8px)); }
  85%         { bottom: 105%; opacity: .35; }
  100%        { bottom: 105%; opacity: 0; transform: scale(.8) rotate(320deg) translateX(0px); }
}

/* Faíscas douradas */
.hanzo-spark {
  position: absolute;
  width: 1px; height: 1px;
  border-radius: 50%;
  background: rgba(255,220,80,.9);
  box-shadow: 0 0 4px 1px rgba(255,200,40,.6);
  animation: hspark var(--d, 6s) ease-in infinite var(--dl, 0s);
  opacity: 0;
}
@keyframes hspark {
  0%   { bottom: 0; opacity: 0; transform: scale(0); }
  5%   { opacity: 1; transform: scale(1); }
  60%  { opacity: .7; }
  90%  { bottom: 80%; opacity: 0; transform: scale(.3) translateX(var(--sway, 4px)); }
  100% { bottom: 80%; opacity: 0; }
}

/* Kanji do Hanzo — ouro pulsante */
.hanzo-card .card-kanji {
  animation: hkanji 11s ease-in-out infinite;
  opacity: .07;
  color: rgba(200,155,20,.95);
  text-shadow: 0 0 40px rgba(200,155,20,.2);
}
@keyframes hkanji {
  0%,100% { opacity: .05; transform: scale(1); }
  50%     { opacity: .14; transform: scale(1.02); text-shadow: 0 0 60px rgba(220,170,20,.3); }
}

/* Nome — glow de ouro */
.hanzo-card .card-name {
  animation: hname 11s ease-in-out infinite;
}
@keyframes hname {
  0%,100% { text-shadow: none; }
  50%     { text-shadow: 0 0 50px rgba(200,155,20,.45), 0 0 12px rgba(240,190,40,.2); }
}

/* Accent bar dourada */
.hanzo-card .card-accent {
  background: linear-gradient(90deg, transparent, rgba(140,98,0,.5), rgba(200,150,10,.75), rgba(240,195,50,.9), rgba(200,150,10,.75), rgba(140,98,0,.5), transparent);
  animation: haccent 11s ease-in-out infinite;
}
@keyframes haccent { 0%,100%{opacity:.2} 50%{opacity:.85} }

.hanzo-card .card-tag     { border-color: rgba(180,130,10,.22); color: rgba(240,195,50,.45); }
.hanzo-card .card-epithet { color: rgba(200,165,60,.3); }
.hanzo-card .card-num     { color: rgba(180,140,40,.38); }
.hanzo-card .card-jp      { color: rgba(160,120,30,.3); }

/* Cantos — estilo cofre/moeda */
.hanzo-card::before {
  content: ''; position: absolute; top: 12px; left: 12px;
  width: 14px; height: 14px;
  border-top: 1px solid rgba(180,130,10,.25);
  border-left: 1px solid rgba(180,130,10,.25);
  transition: border-color .3s;
}
.hanzo-card::after {
  content: ''; position: absolute; bottom: 12px; right: 12px;
  width: 14px; height: 14px;
  border-bottom: 1px solid rgba(180,130,10,.25);
  border-right:  1px solid rgba(180,130,10,.25);
  transition: border-color .3s;
}
.hanzo-card:hover::before { border-color: rgba(240,195,50,.65); }
.hanzo-card:hover::after  { border-color: rgba(240,195,50,.65); }

.char-card.add-card {
  --card-color: rgba(80,80,80,.3);
  border: 1px dashed rgba(60,60,40,.2);
  background: transparent;
  align-items: center; justify-content: center;
  min-height: 280px;
  cursor: default;
}
.add-card-inner {
  text-align: center;
  font-family: 'Inconsolata', monospace;
}
.add-card-plus {
  font-size: 2rem; color: rgba(100,90,50,.2); line-height: 1;
  margin-bottom: 14px;
}
.add-card-label {
  font-size: .5rem; letter-spacing: .4em; text-transform: uppercase;
  color: rgba(100,90,50,.2); line-height: 2.2;
}

/* ── FOOTER ── */
footer {
  position: relative; z-index: 2;
  text-align: center; padding: 24px;
  font-family: 'Inconsolata', monospace;
  font-size: .48rem; letter-spacing: .35em; text-transform: uppercase;
  color: rgba(100,80,30,.2);
  border-top: 1px solid rgba(60,45,10,.1);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: .01ms !important; }
}

/* ── LOCK SCREEN ── */
#lock-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #030200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity .8s ease, visibility .8s ease;
}
#lock-screen.unlocking {
  opacity: 0; visibility: hidden; pointer-events: none;
}

/* grain */
#lock-screen::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none; opacity: .022;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* radial vignette */
#lock-screen::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(2,1,0,.85) 100%);
}

.lock-inner {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
  animation: lock-appear 1.2s ease both;
}
@keyframes lock-appear {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: none; }
}

/* Decorative top rule */
.lock-rule-top {
  width: 1px; height: 60px;
  background: linear-gradient(180deg, transparent, rgba(140,110,40,.25));
  margin-bottom: 36px;
}

/* Seal / glyph */
.lock-seal {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.8rem;
  color: rgba(180,155,70,.12);
  line-height: 1;
  margin-bottom: 28px;
  animation: seal-pulse 6s ease-in-out infinite;
  letter-spacing: .05em;
}
@keyframes seal-pulse {
  0%, 100% { color: rgba(180,155,70,.10); }
  50%       { color: rgba(180,155,70,.22); }
}

/* Title */
.lock-title {
  font-family: 'shuriken', serif;
  font-size: clamp(1.4rem, 3.5vw, 2.2rem);
  letter-spacing: .22em;
  color: rgba(200,175,90,.2);
  margin-bottom: 6px;
}
.lock-subtitle {
  font-family: 'Inconsolata', monospace;
  font-size: .48rem; letter-spacing: .55em; text-transform: uppercase;
  color: rgba(140,110,40,.22);
  margin-bottom: 48px;
}

/* Divider */
.lock-divider {
  width: 180px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(140,110,40,.18), transparent);
  margin-bottom: 40px;
}

/* Input group */
.lock-field {
  position: relative;
  width: 260px;
  margin-bottom: 18px;
}
.lock-label {
  font-family: 'Inconsolata', monospace;
  font-size: .44rem; letter-spacing: .5em; text-transform: uppercase;
  color: rgba(120,95,40,.3);
  margin-bottom: 10px;
  display: block;
  text-align: center;
}
.lock-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(100,80,30,.22);
  padding: 10px 14px;
  font-family: 'Inconsolata', monospace;
  font-size: .9rem;
  letter-spacing: .3em;
  color: rgba(200,175,90,.55);
  text-align: center;
  outline: none;
  transition: border-color .3s, color .3s;
  caret-color: rgba(200,175,90,.4);
}
.lock-input::placeholder {
  color: rgba(100,80,30,.2);
  letter-spacing: .3em;
}
.lock-input:focus {
  border-color: rgba(160,130,55,.45);
  color: rgba(220,195,110,.75);
}

/* Underline glow on focus */
.lock-field::after {
  content: '';
  position: absolute; bottom: 0; left: 50%; right: 50%;
  height: 1px;
  background: rgba(180,155,70,.5);
  transition: left .3s, right .3s;
}
.lock-field:focus-within::after {
  left: 0; right: 0;
}

/* Error shake */
.lock-field.error .lock-input {
  animation: lock-shake .35s ease;
  border-color: rgba(180,60,60,.5);
  color: rgba(200,100,100,.7);
}
@keyframes lock-shake {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-8px); }
  40%       { transform: translateX(8px); }
  60%       { transform: translateX(-6px); }
  80%       { transform: translateX(4px); }
}

/* Error message */
.lock-error {
  font-family: 'Inconsolata', monospace;
  font-size: .44rem; letter-spacing: .3em; text-transform: uppercase;
  color: rgba(200,80,80,.0);
  text-align: center;
  transition: color .3s;
  height: 16px;
  margin-bottom: 28px;
}
.lock-error.show { color: rgba(200,80,80,.55); }

/* Enter button */
.lock-btn {
  font-family: 'Inconsolata', monospace;
  font-size: .48rem; letter-spacing: .55em; text-transform: uppercase;
  color: rgba(140,110,40,.35);
  background: none; border: 1px solid rgba(100,80,30,.18);
  padding: 12px 36px; cursor: pointer;
  transition: border-color .3s, color .3s, background .3s;
  width: 260px;
}
.lock-btn:hover {
  border-color: rgba(160,130,55,.4);
  color: rgba(200,175,90,.65);
  background: rgba(80,60,10,.06);
}
.lock-btn:active {
  background: rgba(80,60,10,.12);
}

/* Success flash */
.lock-btn.success {
  border-color: rgba(140,110,40,.5);
  color: rgba(200,175,90,.8);
  background: rgba(80,60,10,.1);
}

/* Bottom rule */
.lock-rule-bottom {
  width: 1px; height: 60px;
  background: linear-gradient(180deg, rgba(140,110,40,.25), transparent);
  margin-top: 44px;
}

/* Attempts indicator dots */
.lock-dots {
  display: flex; gap: 8px;
  margin-top: 24px;
}
.lock-dot {
  width: 4px; height: 4px;
  border: 1px solid rgba(100,80,30,.2);
  border-radius: 50%;
  transition: background .3s, border-color .3s;
}
.lock-dot.filled {
  background: rgba(200,80,80,.4);
  border-color: rgba(200,80,80,.4);
}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════════════

     name     → nome exibido no card

═══════════════════════════════════════════════════════════ */
const ROSTER = [
  {

    name:    'SOUSUKE',

    jp:      '腐食術 · Fushoku-jutsu · O Ambiente Que Já Decidiu',
    num:     'Ficha Nº005 · Feiticeiro · Nv.1',

    epithet: '"Não é veneno. Veneno mata rápido.\nIsso é outra coisa."',
    kanji:   '腐',
    color:   'rgba(192,48,48,.75)',
    glow:    'radial-gradient(ellipse at 50% 70%, rgba(139,10,10,.18) 0%, transparent 65%)',
    special: 'sousuke-card',
  },
  {

/* ── RENDER ── */
function renderRoster() {
  const grid = document.getElementById('roster-grid');
  grid.innerHTML = '';

  ROSTER.forEach(char => {
    const a = document.createElement('a');
    a.href = 'sheets/' + char.id + '.html';
    a.className = 'char-card' + (char.special ? ' ' + char.special : '');
    a.style.setProperty('--card-color', char.color);
    a.style.setProperty('--card-glow', char.glow);

    /* Extras visuais para Sousuke */
    const dripsHTML = char.special === 'sousuke-card' ? `
      <div class="card-drips">
        <div class="card-drip" style="left:12%;height:28px;--d:4.8s;--dl:0s"></div>
        <div class="card-drip" style="left:27%;height:18px;--d:6.2s;--dl:1.1s"></div>
        <div class="card-drip" style="left:44%;height:35px;--d:5.5s;--dl:0.4s"></div>
        <div class="card-drip" style="left:61%;height:22px;--d:7s;--dl:2s"></div>
        <div class="card-drip" style="left:78%;height:30px;--d:5.2s;--dl:0.8s"></div>

    /* Extras visuais para Yagami */

      <div class="card-veins">

        <div class="yagami-scan-line" style="--d:11s;--dl:3.5s"></div>
        <div class="yagami-scan-line" style="--d:7.5s;--dl:6s"></div>

    const geoLinesHTML = char.special === 'kaito-card' ? `

        <div class="kaito-void-dot" style="left:55%;width:4px;height:4px;--d:8s;--dl:5s"></div>
        <div class="kaito-void-dot" style="left:72%;width:2px;height:2px;--d:11s;--dl:1s"></div>
        <div class="kaito-void-dot" style="left:85%;width:3px;height:3px;--d:10s;--dl:7s"></div>

        <div class="saizo-slime-drip" style="left:57%;width:4px;height:25px;--d:8s;--dl:2.2s"></div>
        <div class="saizo-slime-drip" style="left:72%;width:2px;height:35px;--d:5.8s;--dl:0.9s"></div>
        <div class="saizo-slime-drip" style="left:88%;width:3px;height:18px;--d:6.7s;--dl:1.8s"></div>
      </div>
      <div class="card-veins" style="pointer-events:none;overflow:hidden;position:absolute;inset:0;">
        <div class="saizo-blob" style="left:18%;width:4px;height:4px;--d:10s;--dl:0s"></div>
        <div class="saizo-blob" style="left:38%;width:3px;height:3px;--d:13s;--dl:2.5s"></div>
        <div class="saizo-blob" style="left:60%;width:5px;height:5px;--d:9s;--dl:5s"></div>

      <div class="card-epithet">${char.epithet.replace(/\n/g, '<br>')}</div>

    `;
    grid.appendChild(a);
  });

  /* Card "adicionar" */
  const add = document.createElement('div');
  add.className = 'char-card add-card';
  add.innerHTML = `
    <div class="add-card-inner">
      <div class="add-card-plus">+</div>
      <div class="add-card-label">
        Crie sheets/seupersonagem.html<br>
        e adicione uma entrada no ROSTER<br>
        no index.html
      </div>
    </div>

  grid.appendChild(add);
}

/* renderRoster() será chamado apenas após autenticação */
</script>

<script>
/* ── LOCK SCREEN — segurança máxima ─────────────────────────
   A senha é validada via hash SHA-256.
   Para trocar a senha, gere um novo hash:
     No terminal: node -e "const c=require('crypto');
       console.log(c.createHash('sha256').update('SUASENHA').digest('hex'))"
   Cole o resultado em ACCESS_HASH abaixo.
─────────────────────────────────────────────────────────────── */

/* Hash SHA-256 da senha atual (senha: 1223)
   Nunca exponha a senha em texto claro aqui. */
const ACCESS_HASH = 'fa3cfb3f1bb823aa9501f88f1f95f732ee6fef2c3a48be7f1d38037b216a549f';

/* Chave de sessão — uma vez desbloqueado, não pede de novo
   enquanto a aba estiver aberta */
const SESSION_KEY = 'ge_unlocked_v2';

let failCount = 0;
const MAX_FAILS = 3;

/* ── Utilitário de hash ── */
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ── Unlock — revela e popula o conteúdo ── */
function revealContent() {
  sessionStorage.setItem(SESSION_KEY, '1');

  const ls = document.getElementById('lock-screen');
  ls.classList.add('unlocking');
  setTimeout(() => {
    ls.remove(); /* Remove completamente do DOM */
    renderRoster(); /* Só agora o conteúdo é criado */
    document.body.style.overflow = ''; /* Restaura scroll */
  }, 900);
}

/* ── Detecção de DevTools ── */
(function devToolsGuard() {
  let threshold = 160;
  function check() {
    const w = window.outerWidth - window.innerWidth;
    const h = window.outerHeight - window.innerHeight;
    if ((w > threshold || h > threshold) && !sessionStorage.getItem(SESSION_KEY)) {
      /* DevTools abertos antes de autenticar: zera o input */
      const inp = document.getElementById('lock-input');
      if (inp) { inp.value = ''; inp.blur(); }
    }
  }
  setInterval(check, 1000);
})();

/* ── Desabilita click-direito e atalhos de DevTools ── */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  /* F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C, Ctrl+U */
  if (
    e.key === 'F12' ||
    (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) ||
    (e.ctrlKey && e.key.toUpperCase() === 'U')
  ) {
    e.preventDefault();
    return false;
  }
});

/* ── Verifica sessão ao carregar ── */
(function checkSession() {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('lock-screen').remove();
    renderRoster();
    document.body.style.overflow = '';
  } else {
    document.body.style.overflow = 'hidden'; /* Bloqueia scroll do conteúdo por baixo */
    setTimeout(() => document.getElementById('lock-input').focus(), 600);
  }
})();

/* ── Enter no input ── */
document.getElementById('lock-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') tryUnlock();
});

/* ── Tentativa de desbloqueio ── */
async function tryUnlock() {
  const input   = document.getElementById('lock-input');
  const field   = document.getElementById('lock-field');
  const errorEl = document.getElementById('lock-error');
  const btn     = document.getElementById('lock-btn');
  const val     = input.value;

  /* Não processa se input vazio */
  if (!val.trim()) return;

  /* Hash do que foi digitado */
  const inputHash = await sha256(val);

  if (inputHash === ACCESS_HASH) {
    /* ── Sucesso ── */
    btn.classList.add('success');
    btn.textContent = '✦  Acesso Concedido';
    input.disabled = true;

    setTimeout(() => revealContent(), 500);

  } else {
    /* ── Falha ── */
    failCount++;

    const dot = document.getElementById('dot-' + failCount);
    if (dot) dot.classList.add('filled');

    field.classList.remove('error');
    void field.offsetWidth;
    field.classList.add('error');
    errorEl.classList.add('show');

    input.value = '';
    input.focus();

    setTimeout(() => field.classList.remove('error'), 400);

    /* Backoff exponencial após MAX_FAILS */
    if (failCount >= MAX_FAILS) {
      /* Aumenta tempo a cada ciclo: 30s, 60s, 120s... */
      const LOCK_SECS = Math.min(30 * Math.pow(2, Math.floor((failCount - MAX_FAILS) / MAX_FAILS)), 300);
      input.disabled = true;
      btn.disabled   = true;
      btn.style.opacity = '.35';
      btn.style.cursor  = 'not-allowed';

      let remaining = LOCK_SECS;
      const interval = setInterval(() => {
        remaining--;
        btn.textContent     = `⊘  Aguarde ${remaining}s`;
        errorEl.textContent = `Muitas tentativas — bloqueado por ${remaining}s`;
        if (remaining <= 0) {
          clearInterval(interval);
          input.disabled    = false;
          btn.disabled      = false;
          btn.style.opacity = '';
          btn.style.cursor  = '';
          btn.textContent   = '▶   Entrar';
          errorEl.textContent = 'Acesso negado';
          errorEl.classList.remove('show');
          document.querySelectorAll('.lock-dot').forEach(d => d.classList.remove('filled'));
          input.focus();
        }
      }, 1000);
    }
  }
}
</script>
